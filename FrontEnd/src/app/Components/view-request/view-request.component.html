<div class="container-fluid">
    <div class="row flex-nowrap">
        <div class="col-auto col-md-3 col-xl-2 px-sm-2 px-0">
            <div class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-2 text-white min-vh-100">
                <a class="d-flex align-items-center pb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                    <span class="fs-5 d-none d-sm-inline">User Profile</span>
                </a>
                <ul class="nav nav-pills flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start" id="menu">
                    <li>
                        <a href="/userorders" class="nav-link px-0 align-middle">
                            <i class="fs-4 bi-table"></i> <span class="ms-1 d-none d-sm-inline">My Orders</span></a>
                    </li>
                    <li>
                        <a href="/userrequests" class="nav-link px-0 align-middle">
                            <i class="fs-4 bi-clipboard"></i> <span class="ms-1 d-none d-sm-inline">Pending Requests</span> </a>
                    </li>
                </ul>
                <hr>
                <div class="dropdown pb-4">
                    <a href="#" class="d-flex align-items-center text-white text-decoration-none" aria-expanded="false">
                        <i class="fs-4 bi bi-person-circle"></i>
                        <span class="d-none d-sm-inline mx-1">Logout</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="col py-3">
            <!--  Content Area Start  -->
            <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-8">
                    <div class="form-group">
                        <label class="form-label">Name: &nbsp;</label>
                        <label class="form-label">{{order?.name}}</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email: &nbsp;</label>
                        <label class="form-label">{{order?.email}}</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone: &nbsp;</label>
                        <label class="form-label">{{order?.phone}}</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address: &nbsp;</label>
                        <label class="form-label">{{order?.shippingaddress}}</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">City: &nbsp;</label>
                        <label class="form-label">{{order?.city}}</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">State: &nbsp;</label>
                        <label class="form-label">{{order?.state}}</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Pin: &nbsp;</label>
                        <label class="form-label">{{order?.pin}}</label>
                    </div>
                </div>
                <div class="col-md-2"></div>
            </div>
                            
                    
            <!--  Content Area End  -->            
        </div>
    </div>
</div>
