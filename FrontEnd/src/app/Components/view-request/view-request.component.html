<div class="container-fluid">
    <div class="row flex-nowrap">
        <div class="col-auto col-md-3 col-xl-2 px-sm-2 px-0">
            <div class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-2 text-white min-vh-100">
                <a class="d-flex align-items-center pb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                    <span class="fs-5 d-none d-sm-inline">User Profile</span>
                </a>
                <ul class="nav nav-pills flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start" id="menu">
                    <li>
                        <a href="/user-orders" class="nav-link px-0 align-middle">
                            <i class="fs-4 bi-table"></i> <span class="ms-1 d-none d-sm-inline">My Orders</span></a>
                    </li>
                    <li>
                        <a href="/user-requests" class="nav-link px-0 align-middle">
                            <i class="fs-4 bi-clipboard"></i> <span class="ms-1 d-none d-sm-inline">Pending Requests</span> </a>
                    </li>
                </ul>
                <hr>
                <div class="dropdown pb-4">
                    <a href="#" class="d-flex align-items-center text-white text-decoration-none" aria-expanded="false">
                        <i class="fs-4 bi bi-person-circle"></i>
                        <span class="d-none d-sm-inline mx-1">Logout</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="col py-3 mt-4">
            <!--  Content Area Start  -->
            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-10">
                    <div class="card container">
                        <div class="box">
                            <div class="title">Order# {{order?.orderid}}</div>
                            <hr>
                            <div class="form-group">
                                <label class="form-label"><b>Name:</b>&nbsp;</label>
                                <label class="form-label">{{order?.name}}</label>
                            </div>
                            <div class="form-group">
                                <label class="form-label"><b>Email:</b>&nbsp;</label>
                                <label class="form-label">{{order?.email}}</label>
                            </div>
                            <div class="form-group">
                                <label class="form-label"><b>Phone:</b>&nbsp;</label>
                                <label class="form-label">{{order?.phone}}</label>
                            </div>

                            <div style="text-align: center; font-weight: bold; font-size:x-large;">List of Items</div>
                            <div class ="table-responsive-md">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>Sr. No</th>
                                            <th>Product Id</th>
                                            <th>Product Name</th>
                                            <th>Price</th>
                                            <th>Quantity</th>
                                            <th>Total</th>
                                        </tr>
                                    </thead>
                                    <tbody class="table-group-divider">
                                        <tr *ngFor="let item of order?.ordersplaced; let i = index">
                                            <td>{{i+1}}</td>
                                            <td>{{item.pid}}</td>
                                            <td>{{item.name}}</td>
                                            <td style="width: 12%;"><b>₹ {{item.price}}</b></td>
                                            <td style="width: 12%;">{{item.quantity}}</td>
                                            <td style="width: 12%;">{{item.total}}</td>
                                        </tr>
                                        <tr>
                                            <td colspan="4"></td>
                                            <td>Grand Total:</td>
                                            <td><strong> ₹ {{order?.grandtotal}}</strong></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <button class="btn btn-primary" [routerLink]="['/payment',order?.orderid]">Pay Now</button>

                            <div class="form-group">
                                <label class="form-label"><b>Address:</b></label>
                                <br>
                                <label class="form-label" style="white-space: wrap; max-width: 30ch; word-wrap: break-word;">
                                {{order?.shippingaddress}},
                                {{order?.city}},
                                {{order?.state}},
                                Pin: {{order?.pin}}</label>
                            </div>
                        </div>
                     </div>
                </div>
                <div class="col-md-1"></div>
            </div>
                            
                    
            <!--  Content Area End  -->            
        </div>
    </div>
</div>
