<div class="container mt-4">
    <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-6">
            <div class="tab">
                <button routerLink="/login">User</button>
                <button class="active" routerLink="/admin">Admin</button>
            </div>
            <br>
            <div class="card">
                <h3 class="text-primary center"><label>Admin Login</label></h3>
                <hr>
                <div class="row form">
                    <div class="col-auto">
                        <input  [(ngModel)]="email" [ngModelOptions]="{standalone: true}" type="email" class="form-control email" placeholder="provide your email">
                    </div>
                    <div class="col-auto">
                        <button class="btn btn-primary" (click)="onSubmit()">Submit</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3"></div>
    </div>
</div>
